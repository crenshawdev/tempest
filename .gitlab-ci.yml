workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - check
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

lint:
  stage: check
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - echo "passed"

# Builds, GPG-signs, and publishes the self-hosted Flatpak remote to GitLab Pages.
# Required CI/CD variables (Settings > CI/CD > Variables):
#   FLATPAK_GPG_KEY_ID       fingerprint of the signing key (not masked)
#   FLATPAK_GPG_PRIVATE_KEY  base64 of `gpg --export-secret-keys <id>` (masked, protected)
# NOTE: flatpak-builder needs bubblewrap. gitlab.com SaaS runners normally allow it; on a
# restricted/self-managed runner you may need a privileged runner, or publish locally with
# `./packaging/flatpak/publish.sh` and upload ./public via the Pages API instead.
pages:
  stage: release
  image: registry.fedoraproject.org/fedora:41
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  before_script:
    - dnf -y install flatpak flatpak-builder gnupg2 ostree git ca-certificates
    - flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
    - flatpak install -y --user flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08 org.freedesktop.Sdk.Extension.rust-stable//25.08
    - echo "$FLATPAK_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
  script:
    # Guard: the manifest must pin the tag being released. v2.9.1–v2.9.3 shipped with the
    # manifest still on v2.9.0, so the remote silently republished the old build.
    - MANIFEST_TAG=$(grep -o '"tag":\s*"[^"]*"' com.vintagetechie.CosmicExtAppletTempest.json | grep -o 'v[0-9][^"]*')
    - |
      if [ "$MANIFEST_TAG" != "$CI_COMMIT_TAG" ]; then
        echo "FATAL: manifest pins $MANIFEST_TAG but releasing $CI_COMMIT_TAG — bump the manifest (and regenerate cargo-sources.json) before tagging." >&2
        exit 1
      fi
    - FLATPAK_GPG_KEY="$FLATPAK_GPG_KEY_ID" FLATPAK_BUILDER_EXTRA="--disable-rofiles-fuse" ./packaging/flatpak/publish.sh
  artifacts:
    paths:
      - public
  cache:
    key: flatpak-builder-cache
    paths:
      - .flatpak-builder/

# After this app publishes its own repo, poke the shared store to re-aggregate so the
# new build appears in the one-remote-for-everything Flatpak store.
# Requires CI/CD variables STORE_TRIGGER_TOKEN (masked) and STORE_PROJECT_ID.
trigger-store:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  needs:
    - job: pages
  before_script:
    - apk add --no-cache curl
  script:
    - curl --fail-with-body -X POST -F token="$STORE_TRIGGER_TOKEN" -F ref=main
        "https://gitlab.com/api/v4/projects/$STORE_PROJECT_ID/trigger/pipeline"
