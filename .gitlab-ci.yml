workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - check
  - package
  - release
  - deploy

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

lint:
  stage: check
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - echo "passed"

# Builds, GPG-signs, and publishes the self-hosted Flatpak remote to GitLab Pages.
# Required CI/CD variables (Settings > CI/CD > Variables):
#   FLATPAK_GPG_KEY_ID       fingerprint of the signing key (not masked)
#   FLATPAK_GPG_PRIVATE_KEY  base64 of `gpg --export-secret-keys <id>` (masked, protected)
# NOTE: flatpak-builder needs bubblewrap. gitlab.com SaaS runners normally allow it; on a
# restricted/self-managed runner you may need a privileged runner, or publish locally with
# `./packaging/flatpak/publish.sh` and upload ./public via the Pages API instead.
pages:
  stage: release
  image: registry.fedoraproject.org/fedora:41
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  before_script:
    - dnf -y install flatpak flatpak-builder gnupg2 ostree git ca-certificates
    - flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
    - flatpak install -y --user flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08 org.freedesktop.Sdk.Extension.rust-stable//25.08
    - echo "$FLATPAK_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
  script:
    # Guard: the manifest must pin the tag being released. v2.9.1–v2.9.3 shipped with the
    # manifest still on v2.9.0, so the remote silently republished the old build.
    - MANIFEST_TAG=$(grep -o '"tag":\s*"[^"]*"' com.vintagetechie.CosmicExtAppletTempest.json | grep -o 'v[0-9][^"]*')
    - |
      if [ "$MANIFEST_TAG" != "$CI_COMMIT_TAG" ]; then
        echo "FATAL: manifest pins $MANIFEST_TAG but releasing $CI_COMMIT_TAG — bump the manifest (and regenerate cargo-sources.json) before tagging." >&2
        exit 1
      fi
    - FLATPAK_GPG_KEY="$FLATPAK_GPG_KEY_ID" FLATPAK_BUILDER_EXTRA="--disable-rofiles-fuse" ./packaging/flatpak/publish.sh
  artifacts:
    paths:
      - public
  cache:
    key: flatpak-builder-cache
    paths:
      - .flatpak-builder/

# After this app publishes its own repo, poke the shared store to re-aggregate so the
# new build appears in the one-remote-for-everything Flatpak store.
# Requires CI/CD variables STORE_TRIGGER_TOKEN (masked) and STORE_PROJECT_ID.
trigger-store:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  needs:
    - job: pages
  before_script:
    - apk add --no-cache curl
  script:
    - curl --fail-with-body -X POST -F token="$STORE_TRIGGER_TOKEN" -F ref=main
        "https://gitlab.com/api/v4/projects/$STORE_PROJECT_ID/trigger/pipeline"

# ---------------------------------------------------------------------------
# deb/rpm packaging for the APT/RPM store (pkg.jcrenshaw.dev). Independent of
# the flatpak path above. One nfpm config emits BOTH unsigned packages; the
# store re-signs them centrally with the shared key. Tag-only, like the rest.
# ---------------------------------------------------------------------------

# Build the release binary, then package it into a .deb and .rpm with nfpm.
# Output filenames are version-less and MUST match the store's apps.list entry
# (the store pulls a fixed name from the "latest release" permalink).
package:
  stage: package
  image: rust:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  variables:
    NFPM_VERSION: "2.47.0"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends
        libxkbcommon-dev libwayland-dev libwayland-cursor0 libssl-dev pkg-config curl ca-certificates
    - curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
        | tar -xz -C /usr/local/bin nfpm
  script:
    - cargo build --release --locked
    - export VERSION="${CI_COMMIT_TAG#v}"
    - mkdir -p dist
    - nfpm package -f packaging/nfpm.yaml -p deb -t dist/cosmic-ext-applet-tempest_amd64.deb
    - nfpm package -f packaging/nfpm.yaml -p rpm -t dist/cosmic-ext-applet-tempest.x86_64.rpm
    - ls -l dist
  artifacts:
    paths:
      - dist/*.deb
      - dist/*.rpm
    expire_in: 1 week
  cache:
    key: "${CI_COMMIT_REF_SLUG}-cargo"
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - target/

# Create the GitLab Release and attach both packages under filepath
# /packages/<file>, which yields the stable permalink the store downloads:
#   .../releases/permalink/latest/downloads/packages/<file>
# Uploads the files to the generic package registry first (auth via CI_JOB_TOKEN),
# then links them. NOTE: `release:` only *creates* — never pre-create the release
# for a tag, or this job fails and the assets never attach.
gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  needs:
    - job: package
      artifacts: true
  variables:
    DEB: cosmic-ext-applet-tempest_amd64.deb
    RPM: cosmic-ext-applet-tempest.x86_64.rpm
    PKG_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/cosmic-ext-applet-tempest/${CI_COMMIT_TAG}"
  before_script:
    - apk add --no-cache curl
  script:
    - 'curl --fail-with-body --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/${DEB}" "${PKG_URL}/${DEB}"'
    - 'curl --fail-with-body --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/${RPM}" "${PKG_URL}/${RPM}"'
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release of $CI_COMMIT_TAG. deb/rpm attached for pkg.jcrenshaw.dev."
    assets:
      links:
        - name: "$DEB"
          url: "${PKG_URL}/${DEB}"
          filepath: "/packages/${DEB}"
          link_type: package
        - name: "$RPM"
          url: "${PKG_URL}/${RPM}"
          filepath: "/packages/${RPM}"
          link_type: package

# After the release assets are attached, poke the deb/rpm store to re-aggregate.
# Deferred like trigger-store: stays inert until PACKAGES_STORE_TRIGGER_TOKEN is
# set, so a tag pipeline stays green before the store is wired up.
trigger-packages:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/ && $PACKAGES_STORE_TRIGGER_TOKEN'
  needs:
    - job: gitlab-release
  before_script:
    - apk add --no-cache curl
  script:
    - curl --fail-with-body -X POST -F token="$PACKAGES_STORE_TRIGGER_TOKEN" -F ref=main
        "https://gitlab.com/api/v4/projects/$PACKAGES_STORE_PROJECT_ID/trigger/pipeline"
