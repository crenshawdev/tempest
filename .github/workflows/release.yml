# Reusable packaging workflow for a v* release tag.
#
# Invoked by the thin caller .github/workflows/tag.yml on a `v*` tag push.
# Produces the release artifacts from a single run with no manual step:
#   - an UNSIGNED .deb and .rpm attached to the tag's GitHub Release
#     (the pkg.jcrenshaw.dev aggregator re-signs them centrally in Phase 3)
# On success it notifies the droplet aggregator (a logged no-op until the
# rollout phase sets the webhook secret).
name: release

on:
  workflow_call:

jobs:
  # Build the release binary and package it into an UNSIGNED .deb and .rpm with
  # nfpm, then attach both to the tag's GitHub Release under their version-less
  # basenames (no /packages/ prefix) so the Phase 3 aggregator's
  # releases/latest/download/<asset> scheme resolves.
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NFPM_VERSION: "2.47.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libxkbcommon-dev libwayland-dev libwayland-cursor0 libssl-dev pkg-config

      - name: Install nfpm
        run: |
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package .deb and .rpm
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          nfpm package -f packaging/nfpm.yaml -p deb -t dist/cosmic-ext-applet-tempest_amd64.deb
          nfpm package -f packaging/nfpm.yaml -p rpm -t dist/cosmic-ext-applet-tempest.x86_64.rpm
          ls -l dist

      - name: Attach packages to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.deb
            dist/*.rpm

  # Notify the droplet aggregator that a new build is available. Gated inside the
  # step on the AGGREGATOR_WEBHOOK_URL secret (GitHub does not evaluate secrets in
  # job-level `if`), so until the rollout phase sets the secret this is a logged
  # no-op that keeps the run green. app_id is the stable reverse-DNS id the
  # aggregator keys on.
  notify:
    runs-on: ubuntu-latest
    needs: [package]
    steps:
      - name: Notify aggregator
        env:
          URL: ${{ secrets.AGGREGATOR_WEBHOOK_URL }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$URL" ]; then
            echo "aggregator webhook not configured - skipping notify"
            exit 0
          fi
          version="${VERSION#v}"
          curl --fail-with-body -X POST \
            -H 'Content-Type: application/json' \
            -d "{\"app_id\":\"com.vintagetechie.CosmicExtAppletTempest\",\"version\":\"${version}\"}" \
            "$URL"
