# Reusable packaging workflow for a v* release tag.
#
# Invoked by the thin caller .github/workflows/tag.yml on a `v*` tag push.
# Produces the release artifacts from a single run with no manual step:
#   - an UNSIGNED .deb and .rpm attached to the tag's GitHub Release
#     (the pkg.jcrenshaw.dev aggregator re-signs them centrally in Phase 3)
#   - tempest's own archive-z2 OSTree flatpak repo, GPG-signed by the jcrenshaw
#     key and published to GitHub Pages (the aggregator ostree-pulls it and
#     re-serves it at pkg.jcrenshaw.dev/flatpak)
# On success it notifies the droplet aggregator (a logged no-op until the
# rollout phase sets the webhook secret).
name: release

on:
  workflow_call:

jobs:
  # Build the release binary and package it into an UNSIGNED .deb and .rpm with
  # nfpm, then attach both to the tag's GitHub Release under their version-less
  # basenames (no /packages/ prefix) so the Phase 3 aggregator's
  # releases/latest/download/<asset> scheme resolves.
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NFPM_VERSION: "2.47.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libxkbcommon-dev libwayland-dev libwayland-cursor0 libssl-dev pkg-config

      - name: Install nfpm
        run: |
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package .deb and .rpm
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          nfpm package -f packaging/nfpm.yaml -p deb -t dist/cosmic-ext-applet-tempest_amd64.deb
          nfpm package -f packaging/nfpm.yaml -p rpm -t dist/cosmic-ext-applet-tempest.x86_64.rpm
          ls -l dist

      - name: Attach packages to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.deb
            dist/*.rpm

  # Build tempest's flatpak into an archive-z2 OSTree repo, GPG-sign it with the
  # jcrenshaw key (selected by fingerprint, never by email), and publish it to
  # GitHub Pages. The pkg.jcrenshaw.dev aggregator consumes the repo via
  # `ostree remote add --no-gpg-verify` + `ostree pull --mirror` and re-serves it
  # at pkg.jcrenshaw.dev/flatpak. Pages must be enabled once (Settings -> Pages ->
  # Source: GitHub Actions); this per-tag run does not flip that setting.
  #
  # Runs inside the flathub-infra privileged container: flatpak-builder needs the
  # system-helper (revokefs-fuse) for runtime installs, which a bare ubuntu-latest
  # runner denies with "system operation Deploy not allowed for user". The image
  # ships flatpak-builder + ostree + the org.freedesktop 25.08 runtime/SDK, so no
  # apt/flathub bootstrap step is needed. Its tag tracks the manifest's
  # runtime-version (25.08); bump both together on a runtime upgrade.
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing key
        env:
          GPG_SIGNING_KEY_B64: ${{ secrets.GPG_SIGNING_KEY_B64 }}
        run: echo "$GPG_SIGNING_KEY_B64" | base64 -d | gpg --batch --import

      - name: Guard - manifest pins the release tag
        env:
          TAG: ${{ github.ref_name }}
        run: packaging/flatpak/assert-manifest-tag.sh "$TAG"

      - name: Build and GPG-sign the flatpak repo
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: com.vintagetechie.CosmicExtAppletTempest.json
          arch: x86_64
          branch: stable
          gpg-sign: ${{ vars.GPG_FINGERPRINT }}
          repo-dir: public/repo

      - name: Assert archive-z2 repo with the stable ref
        run: |
          ostree --repo=public/repo refs | grep -q 'app/com.vintagetechie.CosmicExtAppletTempest/x86_64/stable'
          test "$(ostree --repo=public/repo config get core.mode)" = archive-z2

      - name: Refresh, static-delta, and re-sign the repo summary
        env:
          FPR: ${{ vars.GPG_FINGERPRINT }}
        run: |
          flatpak build-update-repo \
            --generate-static-deltas \
            --prune --prune-depth=20 \
            --gpg-sign="$FPR" \
            public/repo

      - name: Assert the repo is signed by the intended key
        env:
          FPR: ${{ vars.GPG_FINGERPRINT }}
        run: |
          test -n "$FPR"                 # fingerprint var must be set, or we'd publish an unsigned root
          test -s public/repo/summary.sig # a non-empty detached summary signature must exist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4

  # Notify the droplet aggregator that a new build is available. Gated inside the
  # step on the AGGREGATOR_WEBHOOK_URL secret (GitHub does not evaluate secrets in
  # job-level `if`), so until the rollout phase sets the secret this is a logged
  # no-op that keeps the run green. app_id is the stable reverse-DNS id the
  # aggregator keys on.
  notify:
    runs-on: ubuntu-latest
    needs: [package, flatpak]
    steps:
      - name: Notify aggregator
        env:
          URL: ${{ secrets.AGGREGATOR_WEBHOOK_URL }}
          TOKEN: ${{ secrets.AGGREGATOR_WEBHOOK_TOKEN }}
          METHOD: ${{ vars.AGGREGATOR_WEBHOOK_METHOD || 'POST' }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$URL" ]; then
            echo "aggregator webhook not configured - skipping notify"
            exit 0
          fi
          version="${VERSION#v}"
          auth=()
          if [ -n "$TOKEN" ]; then
            auth=(-H "Authorization: Bearer $TOKEN")
          fi
          curl --fail-with-body -X "$METHOD" \
            "${auth[@]}" \
            -H 'Content-Type: application/json' \
            -d "{\"app_id\":\"com.vintagetechie.CosmicExtAppletTempest\",\"version\":\"${version}\"}" \
            "$URL"
