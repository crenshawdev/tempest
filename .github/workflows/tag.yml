# Thin caller: a `v*` tag push runs the reusable packaging workflow, producing
# the .deb and .rpm from a single run.
#
# A reusable workflow's GITHUB_TOKEN cannot be elevated above the caller's, so
# this caller declares the write permission explicitly. Without it, a repo whose
# default workflow permissions are read-only would 403 on release creation.
name: tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    secrets: inherit
